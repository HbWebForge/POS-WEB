<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiter Dashboard - Restaurant POS</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dashboard">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>🍔 FastFood POS</h2>
            <p id="userRole" class="user-role"></p>
        </div>
        <ul class="sidebar-nav">
            <li><a href="#" class="nav-link active" data-page="orders">📝 New Order</a></li>
            <li><a href="#" class="nav-link" data-page="active-orders">📊 My Orders</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div>
                <h1 id="pageTitle">New Order</h1>
            </div>
            <div class="header-info">
                <p>Time: <span id="currentTime"></span></p>
                <p id="userInfo"></p>
            </div>
        </div>

        <!-- Orders Page -->
        <div id="ordersPage" class="page-content">
            <div class="waiter-dashboard">
                <!-- Menu Section -->
                <div>
                    <!-- Order Type Selection -->
                    <div class="menu-section">
                        <h3>Order Type</h3>
                        <div class="order-type-selector">
                            <button class="order-type-btn active" data-type="dine-in">🪑 Dine-In</button>
                            <button class="order-type-btn" data-type="takeaway">🛍️ Takeaway</button>
                            <button class="order-type-btn" data-type="delivery">🚚 Delivery</button>
                        </div>
                    </div>

                    <!-- Menu Section -->
                    <div class="menu-section">
                        <h2>Menu</h2>
                        
                        <!-- Category Tabs -->
                        <div class="category-tabs" id="categoryTabs"></div>

                        <!-- Menu Items -->
                        <div class="menu-items" id="menuItems"></div>
                    </div>
                </div>

                <!-- Order Cart -->
                <div class="order-cart">
                    <div class="cart-header">🛒 Order Cart</div>
                    
                    <div class="customer-info">
                        <input type="text" id="customerName" placeholder="Customer Name (optional)">
                        <input type="text" id="tableNumber" placeholder="Table No. (for dine-in)" data-type="dine-in">
                        <div id="deliveryFields" style="display: none;">
                            <input type="text" id="deliveryName" placeholder="Customer Name *" data-type="delivery">
                            <input type="text" id="deliveryAddress" placeholder="Delivery Address *" data-type="delivery">
                            <input type="tel" id="deliveryPhone" placeholder="Phone Number *" data-type="delivery">
                            <input type="number" id="deliveryCharge" placeholder="Delivery Charge (Rs.)" data-type="delivery" value="100">
                        </div>
                    </div>

                    <div class="cart-items" id="cartItems"></div>

                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="subtotal">Rs. 0</span>
                        </div>
                        <div class="summary-row">
                            <span>Discount (5%):</span>
                            <span id="taxAmount">Rs. 0</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total:</span>
                            <span id="totalAmount">Rs. 0</span>
                        </div>
                    </div>

                    <div class="cart-actions">
                        <button class="btn btn-secondary btn-complete" id="clearCartBtn">Clear Cart</button>
                        <button class="btn btn-primary btn-complete" id="submitOrderBtn">📤 Submit Order</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Orders Page -->
        <div id="activeOrdersPage" class="page-content hidden">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="btn btn-secondary" onclick="backToNewOrder()">⬅️ Back to New Order</button>
            </div>
            <div class="orders-list" id="activeOrdersList"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn btn-secondary" onclick="backToNewOrder()">⬅️ Back to New Order</button>
            </div>
        </div>
    </div>

    <!-- Order Details Modal -->
  <div id="orderDetailsModal" class="modal hidden active">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalOrderId">Order Details</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailsBody"></div>
            <div class="modal-body hidden" id="orderEditBody" style="max-height: 70vh; overflow-y: auto;">
                <!-- Edit Order Type -->
                <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #ddd;">
                    <h3>Change Order Type</h3>
                    <div class="order-type-selector" id="editOrderTypeSelector">
                        <button class="order-type-btn" data-type="dine-in">🪑 Dine-In</button>
                        <button class="order-type-btn" data-type="takeaway">🛍️ Takeaway</button>
                        <button class="order-type-btn" data-type="delivery">🚚 Delivery</button>
                    </div>
                </div>

             
                <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #ddd;">
                    <h3>Add More Items</h3>
                    <div class="category-tabs" id="editCategoryTabs"></div>
                    <div class="menu-items" id="editMenuItems"></div>
                </div>

            
                <div>
                    <h3>Current Items</h3>
                    <div class="cart-items" id="editCartItems"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="editOrderBtn" style="display: none;">✏️ Edit Order</button>
                <button class="btn btn-secondary" id="saveEditBtn" style="display: none;">💾 Save Changes</button>
                <button class="btn btn-secondary" onclick="closeOrderDetailsModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/waiter.js"></script>
</body>
</html>
